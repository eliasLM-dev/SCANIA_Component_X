name: Docker CI
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker Image
        run: docker build -t scania-component-x .

      - name: Run Tests in Docker
        run: docker run scania-component-x pytest functions/test_functions.py -v
